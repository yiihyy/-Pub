<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>派遇Pub · 驻马店桌边酒馆</title>
  <style>
    :root {
      --bg-dark: #0d0d0d;
      --bg-card: #1a1a1a;
      --bg-card-hover: #222;
      --gold: #c8963e;
      --gold-light: #d4a574;
      --gold-dark: #a67c3d;
      --text: #e0d5c8;
      --text-light: #b8a99a;
      --text-white: #f5f0e8;
      --accent: #c0392b;
      --border: #2a2520;
      --border-light: #3a3530;
      --shadow: 0 8px 28px rgba(0,0,0,0.6);
      --shadow-gold: 0 6px 22px rgba(200,150,62,0.25);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-lg: 18px;
      --font-heading: 'Georgia', 'Noto Serif SC', 'STSong', serif;
      --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; font-size:16px; }
    body {
      font-family: var(--font-body);
      background: var(--bg-dark);
      color: var(--text);
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    /* 导航栏 */
    .navbar {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      background: rgba(13,13,13,0.9); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border); padding:0 20px; transition:0.3s;
    }
    .navbar.scrolled { box-shadow:0 2px 20px rgba(0,0,0,0.7); }
    .navbar .container {
      max-width:1200px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; height:64px;
    }
    .logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text-white); font-family:var(--font-heading); font-size:1.5rem; font-weight:bold; letter-spacing:2px; }
    .logo .icon { width:38px; height:38px; background:linear-gradient(135deg,var(--gold),var(--gold-dark)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; color:#1a1a1a; }
    .nav-links { display:flex; align-items:center; gap:24px; list-style:none; }
    .nav-links a { text-decoration:none; color:var(--text-light); font-size:0.9rem; font-weight:500; letter-spacing:1px; transition:0.3s; position:relative; }
    .nav-links a::after { content:''; position:absolute; bottom:-4px; left:50%; transform:translateX(-50%) scale(0); width:18px; height:2px; background:var(--gold); border-radius:1px; transition:0.3s; }
    .nav-links a:hover, .nav-links a.active { color:var(--gold-light); }
    .nav-links a:hover::after, .nav-links a.active::after { transform:translateX(-50%) scale(1); }
    .cart-icon-wrap { position:relative; background:none; border:none; color:var(--text-light); font-size:1.4rem; cursor:pointer; padding:6px; transition:0.3s; }
    .cart-icon-wrap:hover { color:var(--gold-light); }
    .cart-badge { position:absolute; top:-2px; right:-6px; background:var(--accent); color:#fff; font-size:0.7rem; font-weight:bold; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .hamburger { display:none; background:none; border:none; flex-direction:column; gap:5px; padding:8px; cursor:pointer; z-index:1001; }
    .hamburger span { width:26px; height:2.5px; background:var(--text-light); border-radius:2px; transition:0.3s; }
    .hamburger.active span:nth-child(1) { transform:rotate(45deg) translate(5px,5px); }
    .hamburger.active span:nth-child(2) { opacity:0; }
    .hamburger.active span:nth-child(3) { transform:rotate(-45deg) translate(5px,-5px); }
    /* 英雄区 */
    .hero {
      min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative;
      background:linear-gradient(160deg, #0a0a0a 0%, #1a1410 30%, #0d0d0d 60%, #0a0806 100%);
      overflow:hidden; padding-top:64px;
    }
    .hero::before { content:''; position:absolute; top:-30%; left:-20%; width:80%; height:120%; background:radial-gradient(ellipse at center, rgba(200,150,62,0.08) 0%, transparent 70%); animation:glow 8s infinite; }
    .hero::after { content:''; position:absolute; bottom:-30%; right:-15%; width:60%; height:80%; background:radial-gradient(ellipse at center, rgba(200,150,62,0.05) 0%, transparent 70%); animation:glow 10s infinite reverse; }
    @keyframes glow{0%,100%{opacity:0.6; transform:scale(1);}50%{opacity:1; transform:scale(1.15);}}
    .hero-content { position:relative; z-index:2; text-align:center; padding:40px 20px; max-width:700px; }
    .hero-content .subtitle { font-size:0.9rem; letter-spacing:5px; color:var(--gold-light); text-transform:uppercase; margin-bottom:16px; }
    .hero-content h1 { font-family:var(--font-heading); font-size:clamp(3rem,7vw,5rem); color:var(--text-white); letter-spacing:4px; line-height:1.1; margin-bottom:8px; }
    .hero-content h1 .highlight { color:var(--gold); }
    .tagline { font-size:1rem; color:var(--text-light); letter-spacing:2px; margin-bottom:32px; }
    .btn { display:inline-flex; align-items:center; gap:8px; padding:14px 30px; border-radius:50px; font-size:0.9rem; font-weight:600; letter-spacing:1px; cursor:pointer; border:none; text-decoration:none; transition:0.3s; white-space:nowrap; font-family:var(--font-body); }
    .btn-primary { background:linear-gradient(135deg,var(--gold),var(--gold-dark)); color:#1a1a1a; box-shadow:var(--shadow-gold); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(200,150,62,0.4); }
    .btn-outline { background:transparent; color:var(--gold-light); border:2px solid var(--gold); }
    .btn-outline:hover { background:rgba(200,150,62,0.1); transform:translateY(-2px); }
    /* 特色推荐 */
    .featured-section {
      max-width:1200px; margin:0 auto; padding:60px 20px 40px;
    }
    .section-title {
      text-align:center; margin-bottom:30px;
    }
    .section-title .label { font-size:0.85rem; letter-spacing:4px; color:var(--gold-light); text-transform:uppercase; }
    .section-title h2 { font-family:var(--font-heading); font-size:2.2rem; color:var(--text-white); letter-spacing:2px; margin:8px 0; }
    .featured-grid {
      display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:24px; justify-content:center;
    }
    /* 桌号选择 */
    .table-selector {
      background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:20px; margin:30px auto; max-width:800px; text-align:center;
    }
    .table-selector h3 { font-family:var(--font-heading); color:var(--text-white); letter-spacing:2px; margin-bottom:16px; }
    .table-grid { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
    .table-btn {
      width:60px; height:60px; border-radius:50%; border:2px solid var(--border-light);
      background:transparent; color:var(--text-light); font-size:1.2rem; font-weight:bold;
      cursor:pointer; transition:0.3s; display:flex; align-items:center; justify-content:center;
      font-family:var(--font-body);
    }
    .table-btn:hover { border-color:var(--gold); color:var(--gold-light); }
    .table-btn.selected { background:var(--gold); color:#1a1a1a; border-color:var(--gold); box-shadow:var(--shadow-gold); }
    .table-warning { color:var(--accent); font-size:0.85rem; margin-top:10px; display:none; }
    /* 分类标签 */
    .category-tabs { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:30px 0 20px; }
    .category-tab {
      padding:10px 20px; border-radius:30px; border:1.5px solid var(--border); background:transparent;
      color:var(--text-light); font-size:0.9rem; cursor:pointer; transition:0.3s; letter-spacing:1px;
    }
    .category-tab:hover { border-color:var(--gold); color:var(--gold-light); }
    .category-tab.active { background:var(--gold); color:#1a1a1a; border-color:var(--gold); font-weight:600; }
    /* 菜单网格 */
    .menu-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:20px;
      max-width:1200px; margin:0 auto; padding:0 20px 40px;
    }
    .menu-card {
      background:var(--bg-card); border-radius:var(--radius-lg); overflow:hidden;
      border:1px solid var(--border); transition:0.3s; display:flex; flex-direction:column;
    }
    .menu-card:hover { border-color:var(--border-light); box-shadow:var(--shadow); transform:translateY(-4px); }
    .card-img {
      height:160px; background:#1c1814; display:flex; align-items:center; justify-content:center;
      font-size:4.5rem; position:relative; overflow:hidden;
    }
    .card-img .emoji-bg {
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }
    .menu-card:hover .emoji-bg {
      transform: scale(1.1) rotate(-3deg);
    }
    .card-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:8px; }
    .card-body h4 { font-family:var(--font-heading); color:var(--text-white); letter-spacing:1px; font-size:1.1rem; }
    .card-body .desc { font-size:0.8rem; color:var(--text-light); }
    .spec-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .spec-btn {
      flex:1; padding:8px 10px; border-radius:25px; border:1px solid var(--border-light);
      background:transparent; color:var(--text-light); font-size:0.8rem; cursor:pointer;
      transition:0.3s; display:flex; flex-direction:column; align-items:center; font-weight:600;
    }
    .spec-btn:hover { border-color:var(--gold); color:var(--gold-light); background:rgba(200,150,62,0.1); }
    .spec-btn .price { font-size:0.85rem; color:var(--gold-light); }
    .add-btn {
      background:var(--gold); color:#1a1a1a; border:none; padding:10px 16px; border-radius:25px;
      font-weight:bold; cursor:pointer; transition:0.3s; letter-spacing:1px; margin-top:6px;
    }
    .add-btn:hover { background:var(--gold-light); transform:scale(1.02); }
    .add-btn:disabled { opacity:0.5; cursor:not-allowed; }
    /* 地址区域 */
    .location-section {
      max-width:1000px; margin:60px auto; display:grid; grid-template-columns:1fr 1fr; gap:0;
      background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border); overflow:hidden;
    }
    .location-info { padding:36px; display:flex; flex-direction:column; gap:14px; }
    .location-info h3 { font-family:var(--font-heading); color:var(--text-white); }
    .address-detail strong { color:var(--gold-light); font-size:1.1rem; }
    .info-row { display:flex; align-items:center; gap:10px; color:var(--text-light); }
    .map-container { min-height:280px; background:#1c1814; position:relative; cursor:pointer; }
    .map-container iframe { width:100%; height:100%; border:none; }
    /* 客服组件 */
    .chat-widget { position:fixed; bottom:24px; right:24px; z-index:2000; display:flex; flex-direction:column; align-items:flex-end; gap:10px; }
    .chat-toggle { width:56px; height:56px; border-radius:50%; background:var(--gold); border:none; font-size:1.6rem; color:#1a1a1a; box-shadow:0 6px 24px rgba(200,150,62,0.4); cursor:pointer; transition:0.3s; }
    .chat-panel { width:340px; max-height:500px; background:var(--bg-card); border-radius:var(--radius-lg); border:1px solid var(--border-light); display:flex; flex-direction:column; opacity:0; transform:scale(0.85); pointer-events:none; transition:0.3s; transform-origin:bottom right; }
    .chat-panel.open { opacity:1; transform:scale(1); pointer-events:all; }
    .chat-header { padding:14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
    .chat-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px; max-height:260px; }
    .chat-msg { max-width:80%; padding:10px 14px; border-radius:16px; font-size:0.8rem; }
    .chat-msg.bot { align-self:flex-start; background:#25201a; }
    .chat-msg.user { align-self:flex-end; background:var(--gold-dark); color:#1a1a1a; }
    .chat-input-area { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); }
    .chat-input-area input { flex:1; padding:10px; border-radius:25px; border:1px solid var(--border-light); background:#1a1510; color:var(--text-white); outline:none; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:3000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; }
    .modal-overlay.active { opacity:1; pointer-events:all; }
    .modal-dialog { background:var(--bg-card); border-radius:var(--radius-lg); width:90%; max-width:420px; max-height:85vh; overflow-y:auto; padding:20px; }
    .toast { position:fixed; top:80px; left:50%; transform:translateX(-50%); z-index:4000; background:#2a2520; color:var(--text-white); padding:10px 24px; border-radius:30px; opacity:0; transition:0.3s; }
    .toast.show { opacity:1; }
    @media(max-width:768px){
      .hamburger{display:flex;}
      .nav-links{position:fixed; top:0; right:-100%; width:70%; height:100vh; background:rgba(13,13,13,0.95); flex-direction:column; padding:100px 24px; gap:24px; transition:0.3s; z-index:999;}
      .nav-links.open{right:0;}
      .location-section{grid-template-columns:1fr;}
      .menu-grid{grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:12px;}
      .table-btn{width:48px; height:48px; font-size:1rem;}
      .chat-panel{width:calc(100vw - 32px); right:0;}
      .featured-grid {grid-template-columns:1fr;}
      .card-img { font-size: 3.5rem; height:140px; }
    }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="#" class="logo"><span class="icon">🍸</span>派遇Pub</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="#home" class="active">首页</a></li>
        <li><a href="#featured">🔥推荐</a></li>
        <li><a href="#menu-section">菜单</a></li>
        <li><a href="#location">门店地址</a></li>
        <li><button class="cart-icon-wrap" id="cartBtn">🛒<span class="cart-badge" id="cartBadge" style="display:none">0</span></button></li>
      </ul>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <section class="hero" id="home">
    <div class="hero-content">
      <p class="subtitle">驻马店 · 驿城区</p>
      <h1>派遇<span class="highlight">Pub</span></h1>
      <p class="tagline">选一张桌子，开始你的夜晚</p>
      <a href="#menu-section" class="btn btn-primary">📋 立即点单</a>
    </div>
  </section>

  <!-- 特色推荐区块 -->
  <section class="featured-section" id="featured">
    <div class="section-title">
      <span class="label">🔥 招牌推荐</span>
      <h2>百威啤酒 · 动力鸡尾酒</h2>
    </div>
    <div class="featured-grid" id="featuredGrid"></div>
  </section>

  <main style="padding:20px 0;">
    <div id="menu-section" style="padding-top:20px;">
      <div class="table-selector">
        <h3>🪑 请选择桌号（必选）</h3>
        <div class="table-grid" id="tableGrid"></div>
        <p class="table-warning" id="tableWarning">⚠️ 请先选择桌号再点单</p>
      </div>

      <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="alcohol">🍺 酒水</button>
        <button class="category-tab" data-category="drink">🥤 饮品</button>
        <button class="category-tab" data-category="snack">🍟 小吃</button>
        <button class="category-tab" data-category="essential">🃏 酒桌必备</button>
      </div>

      <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div class="location-section" id="location">
      <div class="location-info">
        <h3>📍 派遇Pub</h3>
        <div class="address-detail"><strong>驻马店市驿城区爱克大厦F座18楼</strong></div>
        <div class="info-row">🕐 营业时间：19:00 - 凌晨05:00</div>
        <div class="info-row">📞 19999999999</div>
        <a href="https://map.baidu.com/search/驻马店市驿城区爱克大厦F座" target="_blank" class="btn btn-outline" style="align-self:flex-start;">🗺️ 百度地图导航</a>
      </div>
      <div class="map-container" onclick="window.open('https://map.baidu.com/search/驻马店市驿城区爱克大厦F座','_blank')">
        <iframe src="https://map.baidu.com/search/驻马店市驿城区爱克大厦F座?output=embed" loading="lazy" title="地图"></iframe>
      </div>
    </div>
  </main>

  <footer style="text-align:center; padding:30px; color:var(--text-light); border-top:1px solid var(--border);">
    <p>派遇Pub · 爱克大厦F座18楼</p>
    <p style="font-size:0.8rem;">营业时间 19:00 - 05:00 | 电话 19999999999</p>
    <p style="font-size:0.8rem;">适度饮酒 享受生活</p>
  </footer>

  <!-- 客服 -->
  <div class="chat-widget" id="chatWidget">
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header"><span>🤵 派遇小助手</span><button id="chatClose" style="margin-left:auto; background:none; border:none; color:var(--text);">✕</button></div>
      <div class="chat-messages" id="chatMessages"><div class="chat-msg bot">您好！选好桌号即可点单，有什么需要帮忙的？</div></div>
      <div class="chat-input-area"><input type="text" id="chatInput" placeholder="输入问题..."><button id="chatSendBtn" style="background:var(--gold); border:none; border-radius:50%; width:36px;">➤</button></div>
    </div>
    <button class="chat-toggle" id="chatToggle">💬</button>
  </div>

  <div class="modal-overlay" id="paymentModal"><div class="modal-dialog" id="modalBody"></div></div>
  <div class="toast" id="toast"></div>

  <script>
    (function() {
      // 商品数据
      const products = {
        alcohol: [
          { name:'精酿熊猫啤酒', emoji:'🐼🍺', specs:[{label:'瓶',price:7},{label:'箱',price:88}] },
          { name:'科罗娜啤酒', emoji:'🍋🍺', specs:[{label:'瓶',price:14},{label:'箱',price:188}] },
          { name:'百威啤酒', emoji:'🍺', specs:[{label:'瓶',price:10},{label:'箱',price:158}] },
          { name:'动力鸡尾酒', emoji:'🍹', specs:[{label:'瓶',price:6},{label:'箱',price:58}] },
          { name:'乐堡啤酒', emoji:'🍻', specs:[{label:'瓶',price:8},{label:'箱',price:128}] },
          { name:'纯生啤酒', emoji:'🍺', specs:[{label:'瓶',price:6},{label:'箱',price:88}] }
        ],
        drink: [
          { name:'红牛', emoji:'🥤', price:12 },
          { name:'娃哈哈AD钙奶', emoji:'🥛', price:8 },
          { name:'名仁苏打水', emoji:'💧', price:5 },
          { name:'绿茶', emoji:'🍵', price:5 },
          { name:'红茶', emoji:'☕', price:5 },
          { name:'农夫山泉', emoji:'💧', price:3 }
        ],
        snack: [
          { name:'火鸡面', emoji:'🍜', price:9.9 },
          { name:'酒鬼花生', emoji:'🥜', price:9.9 },
          { name:'五香瓜子', emoji:'🌻', price:9.9 },
          { name:'香辣锅巴', emoji:'🍘', price:9.9 }
        ],
        essential: [
          { name:'纸巾', emoji:'🧻', price:2 },
          { name:'一副扑克牌', emoji:'🃏', price:3 },
          { name:'一桶冰块', emoji:'🧊', price:0 }
        ]
      };

      // 特色推荐商品
      const featuredProducts = products.alcohol.filter(p => p.name === '百威啤酒' || p.name === '动力鸡尾酒');

      let selectedTable = null;
      let cart = [];
      const menuGrid = document.getElementById('menuGrid');
      const featuredGrid = document.getElementById('featuredGrid');
      const tableGrid = document.getElementById('tableGrid');
      const tableWarning = document.getElementById('tableWarning');
      const cartBadge = document.getElementById('cartBadge');
      const toast = document.getElementById('toast');
      const paymentModal = document.getElementById('paymentModal');
      const modalBody = document.getElementById('modalBody');

      // 生成桌号1-10
      for(let i=1; i<=10; i++) {
        const btn = document.createElement('button');
        btn.className = 'table-btn';
        btn.textContent = i;
        btn.dataset.table = i;
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedTable = i;
          tableWarning.style.display = 'none';
          updateAddButtons();
          showToast(`已选择 ${i} 号桌`);
        });
        tableGrid.appendChild(btn);
      }

      function updateAddButtons() {
        document.querySelectorAll('.add-btn').forEach(btn => {
          if(!selectedTable) btn.disabled = true;
          else btn.disabled = false;
        });
      }

      // 渲染特色推荐 (使用Emoji)
      function renderFeatured() {
        featuredGrid.innerHTML = featuredProducts.map(item => {
          return `
            <div class="menu-card">
              <div class="card-img">
                <span class="emoji-bg">${item.emoji || '🍺'}</span>
              </div>
              <div class="card-body">
                <h4>${item.name}</h4>
                <div class="spec-btns">
                  ${item.specs.map(s => `<button class="spec-btn" onclick="addToCart('${item.name}','${s.label}',${s.price},'alcohol')"><span>${s.label}</span><span class="price">¥${s.price}</span></button>`).join('')}
                </div>
              </div>
            </div>`;
        }).join('');
      }

      function renderMenu(category = 'alcohol') {
        const items = products[category] || [];
        menuGrid.innerHTML = items.map(item => {
          if(item.specs) {
            return `
              <div class="menu-card">
                <div class="card-img">
                  <span class="emoji-bg">${item.emoji || '🍺'}</span>
                </div>
                <div class="card-body">
                  <h4>${item.name}</h4>
                  <div class="spec-btns">
                    ${item.specs.map(s => `<button class="spec-btn" onclick="addToCart('${item.name}','${s.label}',${s.price},'${category}')"><span>${s.label}</span><span class="price">¥${s.price}</span></button>`).join('')}
                  </div>
                </div>
              </div>`;
          } else {
            return `
              <div class="menu-card">
                <div class="card-img">
                  <span class="emoji-bg">${item.emoji || '🛍️'}</span>
                </div>
                <div class="card-body">
                  <h4>${item.name}</h4>
                  <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--gold-light); font-weight:bold;">¥${item.price}</span>
                    <button class="add-btn" onclick="addToCart('${item.name}','份',${item.price},'${category}')" ${!selectedTable?'disabled':''}>加入</button>
                  </div>
                </div>
              </div>`;
          }
        }).join('');
        updateAddButtons();
      }

      window.addToCart = function(name, spec, price, category) {
        if(!selectedTable) {
          tableWarning.style.display = 'block';
          showToast('请先选择桌号！');
          return;
        }
        cart.push({ name, spec, price, table: selectedTable });
        updateCartBadge();
        showToast(`已添加 ${name}(${spec}) 到${selectedTable}号桌`);
      };

      function updateCartBadge() {
        const count = cart.length;
        cartBadge.style.display = count ? 'flex' : 'none';
        cartBadge.textContent = count;
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      }

      // 分类切换
      document.getElementById('categoryTabs').addEventListener('click', (e) => {
        if(e.target.classList.contains('category-tab')) {
          document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          renderMenu(e.target.dataset.category);
        }
      });

      // 购物车点击
      document.getElementById('cartBtn').addEventListener('click', () => {
        if(cart.length === 0) { showToast('购物车空空如也'); return; }
        const total = cart.reduce((s,i) => s + i.price, 0);
        const itemsHtml = cart.map((item,idx) => `<div style="display:flex; justify-content:space-between;"><span>${idx+1}. ${item.name} (${item.spec})</span><span>¥${item.price}</span></div>`).join('');
        modalBody.innerHTML = `
          <h3 style="color:var(--text-white);">🛒 桌号 ${cart[0].table} 的订单</h3>
          ${itemsHtml}
          <div style="display:flex; justify-content:space-between; margin:16px 0; font-weight:bold;"><span>合计</span><span style="color:var(--gold-light);">¥${total}</span></div>
          <button class="btn-primary" style="width:100%;" id="payCartBtn">去支付 ¥${total}</button>
          <button style="background:transparent; border:1px solid var(--border); color:var(--text-light); width:100%; margin-top:8px; padding:12px; border-radius:30px;" id="clearCartBtn">清空购物车</button>
        `;
        paymentModal.classList.add('active');
        document.getElementById('payCartBtn').addEventListener('click', ()=>{
          modalBody.innerHTML = `<div style="text-align:center; padding:20px;"><span style="font-size:3rem;">✅</span><p>支付成功！${cart[0].table}号桌总计¥${total}</p></div>`;
          cart = []; updateCartBadge();
          setTimeout(()=>{ paymentModal.classList.remove('active'); }, 2000);
        });
        document.getElementById('clearCartBtn').addEventListener('click', ()=>{
          cart = []; updateCartBadge(); paymentModal.classList.remove('active'); showToast('购物车已清空');
        });
      });

      paymentModal.addEventListener('click', (e) => { if(e.target === paymentModal) paymentModal.classList.remove('active'); });

      // 客服 (营业时间 19:00-05:00，电话 19999999999)
      const chatPanel = document.getElementById('chatPanel');
      const chatToggle = document.getElementById('chatToggle');
      const chatMessages = document.getElementById('chatMessages');
      chatToggle.addEventListener('click', ()=> chatPanel.classList.toggle('open'));
      document.getElementById('chatClose').addEventListener('click', ()=> chatPanel.classList.remove('open'));
      function sendMsg(text) {
        chatMessages.innerHTML += `<div class="chat-msg user">${text}</div>`;
        setTimeout(()=>{
          let reply = '感谢咨询，欢迎拨打 19999999999。';
          if(text.includes('营业') || text.includes('时间')) reply = '我们每天19:00开始营业，一直到凌晨5:00！';
          else if(text.includes('地址') || text.includes('在哪')) reply = '驻马店市驿城区爱克大厦F座18楼，点击地图可导航。';
          else if(text.includes('电话')) reply = '门店电话：19999999999，欢迎来电预约。';
          chatMessages.innerHTML += `<div class="chat-msg bot">${reply}</div>`;
          chatMessages.scrollTop = chatMessages.scrollHeight;
        },400);
      }
      document.getElementById('chatSendBtn').addEventListener('click', ()=>{
        const input = document.getElementById('chatInput');
        if(input.value.trim()) { sendMsg(input.value); input.value = ''; }
      });
      document.getElementById('chatInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
          const input = document.getElementById('chatInput');
          if(input.value.trim()) { sendMsg(input.value); input.value = ''; }
        }
      });

      // 导航移动端
      const hamburger = document.getElementById('hamburger');
      const navLinks = document.getElementById('navLinks');
      hamburger.addEventListener('click', ()=>{
        navLinks.classList.toggle('open'); hamburger.classList.toggle('active');
      });
      navLinks.querySelectorAll('a').forEach(a=> a.addEventListener('click', ()=> {
        navLinks.classList.remove('open');
        hamburger.classList.remove('active');
      }));

      // 初始渲染
      renderFeatured();
      renderMenu('alcohol');
      updateAddButtons();
    })();
  </script>
</body>
</html>
